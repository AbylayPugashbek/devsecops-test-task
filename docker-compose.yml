version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    volumes:
      - .:/app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - econo-net

  redis:
    image: redis:7.4-alpine
    expose:
      - "6379"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - econo-net

networks:
  econo-net:
    driver: bridge