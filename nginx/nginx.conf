server {
    listen 80;
    server_name econo-engine.io;

    # Vuln: No HTTPS redirect
    # Vuln: No security headers (X-Frame-Options, CSP, HSTS, X-Content-Type-Options)
    # Vuln: Server version exposed
    # server_tokens off;  # commented out - version is visible

    # Vuln: No rate limiting configured

    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vuln: Directory listing enabled
    location /uploads/ {
        alias /app/uploads/;
        autoindex on;
    }

    # Vuln: Exposing internal status
    location /nginx_status {
        stub_status on;
        # No access restriction
    }

    # Vuln: Access to .env and hidden files
    # location ~ /\. { deny all; }  # commented out

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
