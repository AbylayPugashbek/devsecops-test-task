name: Security

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2